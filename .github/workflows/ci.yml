name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Check syntax
        run: |
          python -m py_compile wscraper/cli.py
          python -m py_compile wscraper/scraper.py
          python -m py_compile wscraper/extractor.py
          python -m py_compile wscraper/schema.py
          python -m py_compile wscraper/robots.py
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
      - name: Verify installation
        run: |
          pip install -e .
          wscraper --help || true
